<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Reading Made Easy</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sun:   #D4A843;
      --sky:   #5B8FA8;
      --leaf:  #4A9970;
      --coral: #B85C4A;
      --grape: #7060A0;
      --white: #F8F7F4;
      --ink:   #1A1A2E;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body:    'Inter', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-body); background: var(--white); color: var(--ink); overflow-x: hidden; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.5rem;
      background: var(--white);
      box-shadow: 0 2px 0 #D4A843;
    }
    .nav-logo { font-family: var(--font-display); font-size: 1.6rem; font-weight: 800; color: var(--coral); }
    .nav-logo span { color: var(--sky); }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav ul a { text-decoration: none; font-weight: 700; font-size: .95rem; color: var(--ink); transition: color .2s; }
    nav ul a:hover { color: var(--coral); }
    .nav-cta { background: var(--coral); color: #fff !important; padding: .45rem 1.2rem; border-radius: 8px; }

    /* HERO */
    .hero {
      min-height: 90vh;
      background: linear-gradient(160deg, #F5F0E8 0%, #EAF0F5 60%, #ECF3EE 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 5rem 2.5rem 4rem;
      position: relative; overflow: hidden;
    }
    .hero::before { content:''; position:absolute; border-radius:50%; width:420px; height:420px; background:var(--grape); top:-140px; right:-120px; opacity:.12; pointer-events:none; }
    .hero::after  { content:''; position:absolute; border-radius:50%; width:300px; height:300px; background:var(--leaf);  bottom:-100px; left:-80px;   opacity:.12; pointer-events:none; }
    .hero-inner { display:grid; grid-template-columns:1fr 1fr; gap:3rem; max-width:1100px; align-items:center; z-index:1; }
    .hero-text h1 { font-family:var(--font-display); font-size:clamp(2.4rem,5vw,3.8rem); font-weight:800; line-height:1.1; }
    .hero-text h1 em { font-style:normal; background:linear-gradient(90deg,var(--coral),var(--grape)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .hero-text p { margin-top:1.2rem; font-size:1.1rem; line-height:1.7; color:#444; }
    .btn-group { display:flex; gap:1rem; margin-top:2rem; flex-wrap:wrap; }
    .btn { display:inline-block; padding:.75rem 2rem; border-radius:8px; font-family:var(--font-display); font-size:1rem; font-weight:700; text-decoration:none; transition:transform .2s,box-shadow .2s; }
    .btn:hover { transform:translateY(-3px); box-shadow:0 8px 20px rgba(0,0,0,.15); }
    .btn-primary { background:var(--coral); color:#fff; }
    .btn-secondary { background:var(--sun); color:var(--ink); }

    /* IMAGE SLOTS */
    .img-slot {
      border-radius:12px; border:3px dashed;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:.6rem; cursor:pointer; transition:transform .3s, box-shadow .3s;
      text-align:center; padding:1.5rem;
    }
    .img-slot:hover { transform:rotate(-2deg) scale(1.03); box-shadow:0 12px 30px rgba(0,0,0,.12); }
    .img-slot .slot-icon  { font-size:2.8rem; }
    .img-slot .slot-label { font-family:var(--font-display); font-weight:700; font-size:.95rem; color:#888; }
    .img-slot .slot-hint  { font-size:.78rem; color:#bbb; }
    .img-slot.cover { width:100%; max-width:340px; aspect-ratio:3/4; background: linear-gradient(135deg,#F0EAD8,#EDD5CC); border-color:var(--coral); box-shadow:8px 8px 0 var(--coral); }
    .book-wrap { display:flex; justify-content:center; }

    /* SECTION SHARED */
    .section-tag { display:inline-block; background:var(--sun); color:var(--ink); font-weight:800; padding:.3rem 1rem; border-radius:8px; font-size:.85rem; letter-spacing:.05em; text-transform:uppercase; margin-bottom:1rem; }

    /* ABOUT */
    .about { background:#fff; padding:5rem 2.5rem; text-align:center; }
    .about h2 { font-family:var(--font-display); font-size:2.4rem; font-weight:800; }
    .about p  { max-width:640px; margin:1rem auto 0; font-size:1.05rem; line-height:1.8; color:#555; }

    /* FEATURES */
    .features { padding:5rem 2.5rem; background: #F4F6F8; }
    .features h2 { font-family:var(--font-display); font-size:2.2rem; font-weight:800; text-align:center; margin-bottom:3rem; }
    .features-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:2rem; max-width:1100px; margin:0 auto; }
    .feature-card { background:#fff; border-radius:12px; padding:2rem 1.5rem; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,.06); transition:transform .25s; }
    .feature-card:hover { transform:translateY(-6px); }
    .feature-card .emoji { font-size:2.5rem; margin-bottom:.8rem; }
    .feature-card h3 { font-family:var(--font-display); font-weight:700; font-size:1.15rem; margin-bottom:.5rem; }
    .feature-card p { font-size:.9rem; color:#666; line-height:1.6; }

    /* PREVIEW */
    .preview { padding:5rem 2.5rem; background:#fff; }
    .preview h2 { font-family:var(--font-display); font-size:2.2rem; font-weight:800; text-align:center; margin-bottom:2.5rem; }
    .preview-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1.5rem; max-width:1000px; margin:0 auto; }
    .img-slot.page { aspect-ratio:4/5; border-color:var(--sky); background: #EDF3F7; }
    .img-slot.page:nth-child(2) { border-color:var(--grape); background: #EEE9F5; }
    .img-slot.page:nth-child(3) { border-color:var(--leaf); background: #E8F3EC; }
    .img-slot.page:nth-child(4) { border-color:var(--sun); background: #F5EFDF; }

    /* TESTIMONIALS */
    .testimonials { padding:5rem 2.5rem; background: #F2F4F6; }
    .testimonials h2 { font-family:var(--font-display); font-size:2.2rem; font-weight:800; text-align:center; margin-bottom:2.5rem; }
    .testi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:1.5rem; max-width:1000px; margin:0 auto; }
    .testi-card { background:#fff; border-radius:12px; padding:1.8rem; box-shadow:0 4px 18px rgba(0,0,0,.07); }
    .testi-card .stars { color:var(--sun); font-size:1.1rem; margin-bottom:.7rem; }
    .testi-card p { font-size:.95rem; line-height:1.7; color:#555; font-style:italic; }
    .testi-card .author { margin-top:1rem; font-weight:700; font-size:.9rem; color:var(--ink); }

    /* CTA BANNER */
    .cta-banner { background: linear-gradient(135deg,#B85C4A,#7060A0); padding:4rem 2.5rem; text-align:center; color:#fff; }
    .cta-banner h2 { font-family:var(--font-display); font-size:2.4rem; font-weight:800; margin-bottom:1rem; }
    .cta-banner p  { font-size:1.05rem; opacity:.9; margin-bottom:2rem; }
    .btn-white { background:#fff; color:var(--coral); }

    /* ════════════════════════════════
       FOOTER CONTACT
    ════════════════════════════════ */
    footer { background:var(--ink); color:#fff; }

    .footer-contact {
      background: #1A1F2E;
      padding:4.5rem 2.5rem;
      display:flex; flex-direction:column; align-items:center;
      gap:1.2rem; text-align:center;
    }
    .footer-contact h3 {
      font-family:var(--font-display);
      font-size:2rem; font-weight:800;
      color:var(--sun);
    }
    .footer-contact > p {
      font-size:1rem; color:#aabbcc;
      max-width:500px; line-height:1.8;
    }

    /* divider dots */
    .footer-dots { display:flex; gap:.5rem; align-items:center; margin:.2rem 0; }
    .footer-dots span { width:8px; height:8px; border-radius:50%; }
    .footer-dots .d1 { background:var(--coral); }
    .footer-dots .d2 { background:var(--sun); }
    .footer-dots .d3 { background:var(--leaf); }

    .contact-buttons {
      display:flex; gap:1.2rem; flex-wrap:wrap;
      justify-content:center; margin-top:.8rem;
    }
    .contact-btn {
      display:inline-flex; align-items:center; gap:.7rem;
      padding:.9rem 2.2rem; border-radius:8px;
      font-family:var(--font-display); font-size:1.05rem; font-weight:700;
      text-decoration:none;
      transition:transform .22s, box-shadow .22s;
    }
    .contact-btn:hover { transform:translateY(-5px); box-shadow:0 12px 32px rgba(0,0,0,.4); }

    /* WhatsApp button */
    .contact-btn.whatsapp { background:#25D366; color:#fff; }
    .wa-icon-wrap { position:relative; display:flex; align-items:center; }
    .wa-icon-wrap::after {
      content:''; position:absolute; inset:-5px; border-radius:50%;
      border:2px solid rgba(255,255,255,.45);
      animation:pulse 2s ease-out infinite;
    }
    @keyframes pulse {
      0%   { transform:scale(.85); opacity:1; }
      100% { transform:scale(1.7); opacity:0; }
    }

    /* Email button */
    .contact-btn.email { background:var(--sky); color:var(--ink); }

    /* info lines */
    .contact-info { margin-top:1rem; display:flex; flex-direction:column; gap:.4rem; align-items:center; }
    .contact-info a { color:#aabbcc; font-size:.9rem; text-decoration:none; transition:color .2s; }
    .contact-info a:hover { color:var(--sun); }

    /* bottom bar */
    .footer-bottom {
      background:#0d1322;
      padding:1.2rem 2.5rem;
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:.5rem;
    }
    .footer-bottom p { font-size:.85rem; color:#445566; }
    .footer-logo { font-family:var(--font-display); font-size:1.1rem; font-weight:800; color:var(--coral); }
    .footer-logo span { color:var(--sky); }

    /* RESPONSIVE */
    /* ── MOBILE BASE ── */
    * { word-break: break-word; }

    @media (max-width:700px) {
      /* Nav */
      nav { padding: .8rem 1.2rem; }
      nav ul { display:none; }

      /* Hero */
      .hero { padding: 2.5rem 1.2rem 2rem; min-height: unset; }
      .hero-inner { grid-template-columns:1fr; text-align:center; gap: 1.5rem; }
      .hero-text h1 { font-size: 1.6rem; line-height: 1.2; }
      .hero-text p {
        font-size: .88rem;
        line-height: 1.6;
        padding: 0;
        max-width: 100%;
        overflow-wrap: break-word;
        word-wrap: break-word;
        max-height: 180px;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        border-left: 3px solid var(--coral);
        padding-left: .8rem;
        padding-right: .4rem;
        background: rgba(255,255,255,0.5);
        border-radius: 0 6px 6px 0;
      }
      .btn-group { justify-content:center; flex-wrap: wrap; gap: .7rem; }
      .btn { padding: .65rem 1.4rem; font-size: .9rem; }

      /* Book covers */
      .covers-row { gap: .8rem; }
      .cover-img { width: 130px !important; }

      /* Sections */
      .about { padding: 3rem 1.2rem; }
      .about h2 { font-size: 1.6rem; }
      .about p { font-size: .9rem; }

      .features { padding: 3rem 1.2rem; }
      .features h2 { font-size: 1.6rem; margin-bottom: 1.5rem; }

      .preview { padding: 3rem 1.2rem; }
      .preview h2 { font-size: 1.6rem; }

      .testimonials { padding: 3rem 1.2rem; }
      .testimonials h2 { font-size: 1.6rem; }

      .cta-banner { padding: 2.5rem 1.2rem; }
      .cta-banner h2 { font-size: 1.6rem; }

      .footer-contact { padding: 3rem 1.2rem; }
      .footer-contact h3 { font-size: 1.4rem; }
      .contact-btn { padding: .75rem 1.4rem; font-size: .9rem; }

      .footer-bottom { justify-content:center; text-align:center; padding: 1rem 1.2rem; }
    }

    /* ── DUAL BOOK COVERS ── */
    .covers-row {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      align-items: flex-end;
    }
    .cover-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .6rem;
    }
    .cover-img {
      width: 190px;
      height: auto;
      object-fit: contain;
      border-radius: 10px;
      box-shadow: 6px 6px 0 var(--coral);
      transition: transform .3s, box-shadow .3s;
    }
    .cover-item:first-child .cover-img {
      transform: rotate(-3deg);
    }
    .cover-item:last-child .cover-img {
      transform: rotate(2deg);
      box-shadow: 6px 6px 0 var(--sky);
    }
    .cover-item:hover .cover-img {
      transform: rotate(0deg) scale(1.05) !important;
      box-shadow: 0 16px 36px rgba(0,0,0,.2) !important;
    }
    .cover-badge {
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--coral);
      background: #fff;
      padding: .25rem .75rem;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .cover-item:last-child .cover-badge { color: var(--sky); }

    /* ── READING IMAGE SECTION ── */
    .reading-showcase {
      padding: 5rem 2.5rem;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    .reading-showcase-img {
      width: 380px;
      flex-shrink: 0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0,0,0,.12);
      position: relative;
    }
    .reading-showcase-img img {
      width: 100%;
      display: block;
    }
    .reading-showcase-text h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 1rem;
    }
    .reading-showcase-text p {
      font-size: 1rem;
      line-height: 1.8;
      color: #555;
      margin-bottom: 1.5rem;
    }
    .showcase-wrap { background: #FAFAF8; }

    /* Facebook button */
    .contact-btn.facebook { background: #1877F2; color: #fff; }

    /* Social row in footer */
    .social-row {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: .5rem;
    }

    @media (max-width:700px) {
      .reading-showcase { flex-direction: column; padding: 3rem 1.2rem; gap: 1.5rem; }
      .reading-showcase-img { width: 100%; }
      .reading-showcase-text h2 { font-size: 1.5rem; }
    }
   
</head>

  <!-- ── ABOUT ── -->
  <section class="about" id="about">
    <div class="section-tag">📘 About the Workbook</div>
    <h2>Valuable Springboard For English Language Literacy Beginners</h2>
    <p>"English Reading Made Easy" is a NaCCA (National Council for Curriculum and Assessment)-approved literacy resource material carefully developed to give young learners a strong foundation in reading. Through structured lessons, engaging exercises, and step-by-step skill development, the book helps learners improve pronunciation, comprehension, and reading fluency while building confidence and enthusiasm for learning.</p>
  </section>

  <!-- ── FEATURES ── -->
  <section class="features" id="features">
    <h2>Why Choose The "Reading Made Easy Series"</h2>
    <div class="features-grid">
      <div class="feature-card">
        <div class="emoji">🎨</div>
        <h3>Certification</h3>
        <p>The material has gone through rigorous assessment procedure and has been duly approved by the National Council for Curriculum and Assessment (NaCCA).</p>
      </div>
      <div class="feature-card">
        <div class="emoji">🔤</div>
        <h3>Content</h3>
        <p>The contents cover pre-reading, phonics skills, letter sound identification, vocabulary development and rhyming skills. It also includes fine motor skills and pronunciation among others.</p>
      </div>
      <div class="feature-card">
        <div class="emoji">🧠</div>
        <h3>Stories With Analytical Reasoning</h3>
        <p>The books feature many age appropriate fun stories for critical thinking and exciting reading experience.</p>
      </div>
      <div class="feature-card">
        <div class="emoji">🌍</div>
        <h3>IT Integration</h3>
        <p>Each workbook comes with QR codes that link to short learning videos. Learners can simply scan the code for the rhymes on the page and watch a Youtube video which reinforces the lesson. This also helps to introduce them to other rhymes. This feature thereby introduces digitalization to learners for an exciting learning experience. </p>
      </div>
    </div>
  </section>
